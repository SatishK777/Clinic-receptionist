services:
  - type: web
    name: ai-voice-receptionist-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLINIC_TIMEZONE
        value: Asia/Kolkata
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: VAPI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false

